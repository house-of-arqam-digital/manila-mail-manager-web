<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout - Manila Mail Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .subtitle { color: #666; margin-bottom: 24px; }
    .status { color: #888; font-size: 16px; padding: 20px 0; }
    .error { color: #ef4444; font-size: 14px; padding: 20px 0; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #eee;
      border-top-color: #764ba2;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .retry-btn {
      background: #764ba2; color: white; border: none;
      padding: 12px 24px; border-radius: 8px; font-size: 14px;
      cursor: pointer; margin-top: 12px;
    }
    .retry-btn:hover { background: #653890; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Manila Mail Manager</h1>
    <p class="subtitle">Pro Subscription</p>
    <div id="status">
      <div class="spinner"></div>
      <div class="status">Loading checkout...</div>
    </div>
  </div>

  <script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var txnId = params.get('txn');
      var token = params.get('token');
      var env = params.get('env') || 'sandbox';
      var returnUrl = params.get('return');
      var statusEl = document.getElementById('status');

      if (!txnId || !token) {
        statusEl.innerHTML = '<div class="error">Missing checkout parameters.</div>';
        return;
      }

      function showError(msg) {
        statusEl.innerHTML = '<div class="error">' + msg + '</div>' +
          '<button class="retry-btn" onclick="location.reload()">Try Again</button>';
      }

      try {
        if (env === 'sandbox') {
          Paddle.Environment.set('sandbox');
        }
        Paddle.Initialize({
          token: token,
          eventCallback: function(event) {
            if (event.name === 'checkout.completed') {
              statusEl.innerHTML = '<div class="status" style="color:#10b981;">&#10003; Payment successful!<br><br><span style="font-size:14px;color:#666;">You can close this tab and return to the extension.<br>Your Pro features are now active.</span></div>';
            }
            if (event.name === 'checkout.closed') {
              statusEl.innerHTML = '<div class="status">Checkout closed.</div>' +
                '<button class="retry-btn" onclick="location.reload()">Try Again</button>';
            }
          }
        });

        Paddle.Checkout.open({
          transactionId: txnId,
          settings: {
            displayMode: 'overlay',
            theme: 'light'
          }
        });
      } catch(e) {
        showError('Failed to load checkout: ' + e.message);
      }
    })();
  </script>
</body>
</html>
